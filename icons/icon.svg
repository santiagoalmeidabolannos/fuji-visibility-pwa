<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Sky background -->
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0d1b2e"/>
      <stop offset="100%" stop-color="#1e4976"/>
    </linearGradient>
    <linearGradient id="snow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#dde8f0"/>
    </linearGradient>
    <linearGradient id="mtn" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1c2340"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
  </defs>

  <!-- Rounded square background -->
  <rect width="512" height="512" rx="96" fill="url(#sky)"/>

  <!-- Mountain body -->
  <path d="M 0 512
           L 96 430
           L 192 340
           L 256 230
           L 320 340
           L 416 430
           L 512 512 Z"
        fill="url(#mtn)"/>

  <!-- Snow cap -->
  <path d="M 232 262
           L 248 228
           L 256 208
           L 264 228
           L 280 262
           L 272 276
           L 260 284
           L 256 286
           L 252 284
           L 240 276 Z"
        fill="url(#snow)"/>

  <!-- Star dots -->
  <circle cx="100" cy="80"  r="5" fill="white" opacity="0.7"/>
  <circle cx="200" cy="55"  r="4" fill="white" opacity="0.5"/>
  <circle cx="370" cy="70"  r="5" fill="white" opacity="0.6"/>
  <circle cx="440" cy="48"  r="4" fill="white" opacity="0.5"/>
</svg>
