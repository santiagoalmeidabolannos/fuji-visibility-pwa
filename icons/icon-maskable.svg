<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Maskable: safe zone is central 80% — keep content inside 102px margin -->
  <defs>
    <linearGradient id="snow-m" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#dde8f0"/>
    </linearGradient>
    <linearGradient id="mtn-m" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2a3560"/>
      <stop offset="100%" stop-color="#1c2340"/>
    </linearGradient>
  </defs>

  <!-- Full bleed background -->
  <rect width="512" height="512" fill="#1e4976"/>

  <!-- Mountain body (contained within safe zone horizontally) -->
  <path d="M 60 512
           L 140 420
           L 200 350
           L 256 240
           L 312 350
           L 372 420
           L 452 512 Z"
        fill="url(#mtn-m)"/>

  <!-- Snow cap -->
  <path d="M 236 272
           L 250 238
           L 256 220
           L 262 238
           L 276 272
           L 268 285
           L 258 292
           L 256 293
           L 254 292
           L 244 285 Z"
        fill="url(#snow-m)"/>

  <!-- Stars (within safe zone) -->
  <circle cx="140" cy="130" r="5" fill="white" opacity="0.6"/>
  <circle cx="220" cy="110" r="4" fill="white" opacity="0.5"/>
  <circle cx="360" cy="125" r="5" fill="white" opacity="0.6"/>
  <circle cx="390" cy="100" r="4" fill="white" opacity="0.4"/>
</svg>
